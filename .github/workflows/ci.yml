name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy app || true

      - name: Run tests
        run: pytest -q

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sys_api:ci .

      - name: Smoke (import only)
        run: |
          docker create --name smoke --rm sys_api:ci || true
          docker cp smoke:/app /app || true
          docker rm smoke || true
          echo "Image built OK"
